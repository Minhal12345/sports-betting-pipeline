version: 2

models:
  - name: stg_odds_snapshots
    description: Staging odds snapshots from sports_betting.bronze.odds_snapshots.
    columns:
      - name: stg_odds_snapshot_id
        description: MD5 surrogate for the staging grain (game_id, bookmaker_key, team, snapshot_time, market_key).
        data_tests:
          - unique
          - not_null
      - name: game_id
        data_tests:
          - not_null
      - name: snapshot_time
        data_tests:
          - not_null
